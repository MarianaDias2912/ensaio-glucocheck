<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#FFFFFF"/>

  <!-- ============ LEFT COLUMN (blue panel) ============ -->
  <rect x="0" y="0" width="380" height="800" fill="#D3E1EC"/>

  <!-- Avatar -->
  <defs>
    <clipPath id="avatarClip">
      <circle cx="190" cy="125" r="63"/>
    </clipPath>
  </defs>
  <circle cx="190" cy="125" r="65" fill="#F5EFE6"/>
  <g clip-path="url(#avatarClip)">
    <g transform="translate(190, 125) scale(0.665)">
      <!-- Body / clothing (blouse) -->
      <rect x="-100" y="48" width="200" height="60" fill="#7BA3C4"/>
      <path d="M -14 48 L 0 70 L 14 48 Z" fill="#E8C9AC"/>
      <path d="M -22 56 Q 0 70 22 56" stroke="#5A87B0" stroke-width="1.5" fill="none" opacity="0.6"/>
      <!-- Neck -->
      <rect x="-11" y="28" width="22" height="22" fill="#E8C9AC"/>
      <path d="M -11 28 Q 0 32 11 28" fill="#D9B89A"/>
      <!-- Head/face -->
      <ellipse cx="0" cy="-8" rx="38" ry="44" fill="#F0D2B8"/>
      <!-- Hair (silver bob) -->
      <path d="M -40 -18 Q -42 -52 0 -52 Q 42 -52 40 -18 Q 36 -8 32 -2 Q 28 -22 22 -28 Q 0 -34 -22 -28 Q -28 -22 -32 -2 Q -36 -8 -40 -18 Z" fill="#B8B5B2"/>
      <path d="M -40 -18 L -40 18 Q -38 26 -32 24 L -32 -2 Z" fill="#B8B5B2"/>
      <path d="M 40 -18 L 40 18 Q 38 26 32 24 L 32 -2 Z" fill="#B8B5B2"/>
      <path d="M -22 -34 Q -10 -38 4 -36" stroke="#D8D5D2" stroke-width="2" fill="none" opacity="0.7"/>
      <path d="M 8 -36 Q 18 -34 26 -28" stroke="#D8D5D2" stroke-width="2" fill="none" opacity="0.7"/>
      <!-- Ears + earrings -->
      <ellipse cx="-36" cy="0" rx="4" ry="6" fill="#E8C9AC"/>
      <ellipse cx="36" cy="0" rx="4" ry="6" fill="#E8C9AC"/>
      <circle cx="-36" cy="6" r="2" fill="#D4AF37"/>
      <circle cx="36" cy="6" r="2" fill="#D4AF37"/>
      <!-- Eyebrows -->
      <path d="M -22 -14 Q -14 -17 -6 -14" stroke="#6B6260" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 6 -14 Q 14 -17 22 -14" stroke="#6B6260" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Glasses -->
      <circle cx="-13" cy="-4" r="11" fill="#FFFFFF" fill-opacity="0.18" stroke="#3A3A3A" stroke-width="2"/>
      <circle cx="13" cy="-4" r="11" fill="#FFFFFF" fill-opacity="0.18" stroke="#3A3A3A" stroke-width="2"/>
      <line x1="-2" y1="-4" x2="2" y2="-4" stroke="#3A3A3A" stroke-width="2"/>
      <line x1="-24" y1="-4" x2="-32" y2="-2" stroke="#3A3A3A" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="-4" x2="32" y2="-2" stroke="#3A3A3A" stroke-width="2" stroke-linecap="round"/>
      <!-- Eyes -->
      <circle cx="-13" cy="-4" r="2.2" fill="#3A3A3A"/>
      <circle cx="13" cy="-4" r="2.2" fill="#3A3A3A"/>
      <!-- Cheeks -->
      <ellipse cx="-23" cy="12" rx="6" ry="3.5" fill="#F0A09C" opacity="0.45"/>
      <ellipse cx="23" cy="12" rx="6" ry="3.5" fill="#F0A09C" opacity="0.45"/>
      <!-- Nose -->
      <path d="M 0 6 Q -2 14 0 18 Q 2 17 2 15" stroke="#D4A88A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <!-- Smile -->
      <path d="M -10 24 Q 0 30 10 24" stroke="#8B5050" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M -14 22 Q -16 19 -16 16" stroke="#D4A88A" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 14 22 Q 16 19 16 16" stroke="#D4A88A" stroke-width="1" fill="none" opacity="0.4"/>
    </g>
  </g>
  <circle cx="190" cy="125" r="65" fill="none" stroke="#5A87B0" stroke-width="3"/>

  <!-- Name -->
  <text x="190" y="225" text-anchor="middle" font-size="24" font-weight="700" fill="#1A2B3C">Maria Fernandes</text>

  <!-- Quote -->
  <text x="190" y="258" text-anchor="middle" font-size="13" font-style="italic" fill="#5A6B7C">&quot;Quero estar bem para</text>
  <text x="190" y="276" text-anchor="middle" font-size="13" font-style="italic" fill="#5A6B7C">acompanhar a minha</text>
  <text x="190" y="294" text-anchor="middle" font-size="13" font-style="italic" fill="#5A6B7C">neta a crescer.&quot;</text>

  <!-- INFORMAÇÃO PESSOAL -->
  <text x="30" y="345" font-size="13" font-weight="700" fill="#B8893A" letter-spacing="0.6">INFORMAÇÃO PESSOAL</text>
  <text x="30" y="370" font-size="12.5" fill="#1A2B3C">• 62 anos</text>
  <text x="30" y="390" font-size="12.5" fill="#1A2B3C">• Casada</text>
  <text x="30" y="410" font-size="12.5" fill="#1A2B3C">• 2 filhos adultos</text>
  <text x="30" y="430" font-size="12.5" fill="#1A2B3C">• 1 neta (4 anos)</text>
  <text x="30" y="450" font-size="12.5" fill="#1A2B3C">• Maia, Porto</text>
  <text x="30" y="470" font-size="12.5" fill="#1A2B3C">• Ensino secundário</text>

  <!-- OCUPAÇÃO -->
  <text x="30" y="515" font-size="13" font-weight="700" fill="#B8893A" letter-spacing="0.6">OCUPAÇÃO</text>
  <text x="30" y="540" font-size="12.5" fill="#1A2B3C">• Reformada</text>
  <text x="30" y="560" font-size="12.5" fill="#1A2B3C">  (ex-aux. educativa)</text>

  <!-- COMPETÊNCIAS -->
  <text x="30" y="605" font-size="13" font-weight="700" fill="#B8893A" letter-spacing="0.6">COMPETÊNCIAS</text>
  <text x="30" y="630" font-size="12.5" fill="#1A2B3C">• WhatsApp diário</text>
  <text x="30" y="650" font-size="12.5" fill="#1A2B3C">• Câmara, YouTube</text>
  <text x="30" y="670" font-size="12.5" fill="#1A2B3C">• App banco (com receio)</text>
  <text x="30" y="690" font-size="12.5" fill="#1A2B3C">• Nunca instalou app sozinha</text>

  <!-- VALORES -->
  <text x="30" y="730" font-size="13" font-weight="700" fill="#B8893A" letter-spacing="0.6">VALORES</text>
  <text x="30" y="755" font-size="12.5" fill="#1A2B3C">• Família  • Autonomia</text>
  <text x="30" y="775" font-size="12.5" fill="#1A2B3C">• Confiança na médica</text>

  <!-- ============ RIGHT COLUMN (2x2 sections) ============ -->

  <!-- Section 1: CONTEXTO DA MARIA (top-left) -->
  <g transform="translate(420, 80)">
    <circle cx="0" cy="-7" r="7" fill="none" stroke="#B8893A" stroke-width="2"/>
    <path d="M -10 12 Q 0 4 10 12" stroke="#B8893A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="22" y="8" font-size="15" font-weight="700" fill="#B8893A" letter-spacing="0.6">CONTEXTO DA MARIA</text>
  </g>
  <text x="420" y="125" font-size="12.5" fill="#1A2B3C">Maria foi diagnosticada com <tspan font-weight="700">Diabetes Mellitus</tspan></text>
  <text x="420" y="143" font-size="12.5" fill="#1A2B3C"><tspan font-weight="700">Tipo 2</tspan> há 4 anos. A sua HbA1c atual é <tspan font-weight="700">8,2%</tspan></text>
  <text x="420" y="161" font-size="12.5" fill="#1A2B3C">(controlo subótimo) e está medicada com</text>
  <text x="420" y="179" font-size="12.5" fill="#1A2B3C">metformina e gliclazida, sem insulinoterapia.</text>
  <text x="420" y="197" font-size="12.5" fill="#1A2B3C">É seguida na sua USF, com consulta médica</text>
  <text x="420" y="215" font-size="12.5" fill="#1A2B3C">trimestral e nutrição semestral.</text>
  <text x="420" y="248" font-size="12.5" fill="#1A2B3C">Tem um glucómetro convencional e mede a</text>
  <text x="420" y="266" font-size="12.5" fill="#1A2B3C">glicemia 3–4 vezes por semana, mas sente que</text>
  <text x="420" y="284" font-size="12.5" fill="#1A2B3C">entre consultas <tspan font-style="italic">&quot;está sozinha&quot;</tspan> com a doença</text>
  <text x="420" y="302" font-size="12.5" fill="#1A2B3C">e não sabe interpretar oscilações. A médica</text>
  <text x="420" y="320" font-size="12.5" fill="#1A2B3C">de família recomendou-lhe a participação no</text>
  <text x="420" y="338" font-size="12.5" fill="#1A2B3C">estudo da app GlucoCheck.</text>

  <!-- Section 2: OBJETIVOS (top-right) -->
  <g transform="translate(830, 80)">
    <circle cx="0" cy="0" r="11" fill="none" stroke="#B8893A" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#B8893A" stroke-width="2"/>
    <circle cx="0" cy="0" r="2" fill="#B8893A"/>
    <text x="22" y="5" font-size="15" font-weight="700" fill="#B8893A" letter-spacing="0.6">OBJETIVOS</text>
  </g>
  <text x="830" y="120" font-size="12.5" fill="#1A2B3C">• Baixar HbA1c sem alterar a</text>
  <text x="830" y="138" font-size="12.5" fill="#1A2B3C">  medicação</text>
  <text x="830" y="166" font-size="12.5" fill="#1A2B3C">• Perceber o impacto da</text>
  <text x="830" y="184" font-size="12.5" fill="#1A2B3C">  alimentação nos seus valores</text>
  <text x="830" y="212" font-size="12.5" fill="#1A2B3C">• Ter mais energia para a neta</text>
  <text x="830" y="240" font-size="12.5" fill="#1A2B3C">• Sentir-se acompanhada entre</text>
  <text x="830" y="258" font-size="12.5" fill="#1A2B3C">  consultas</text>
  <text x="830" y="286" font-size="12.5" fill="#1A2B3C">• Evitar a insulina no futuro</text>

  <!-- Section 3: DESAFIOS (bottom-left) -->
  <g transform="translate(420, 450)">
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#B8893A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 -13 L 18 -8 L 12 -3 L 18 2 L 0 2 Z" fill="#B8893A"/>
    <text x="30" y="5" font-size="15" font-weight="700" fill="#B8893A" letter-spacing="0.6">DESAFIOS</text>
  </g>
  <text x="420" y="490" font-size="12.5" fill="#1A2B3C">• Sente-se sozinha entre consultas</text>
  <text x="420" y="513" font-size="12.5" fill="#1A2B3C">• Confunde-se com termos clínicos</text>
  <text x="420" y="531" font-size="12.5" fill="#1A2B3C">  (HbA1c, glicemia em jejum)</text>
  <text x="420" y="554" font-size="12.5" fill="#1A2B3C">• Não interpreta oscilações de glicemia</text>
  <text x="420" y="577" font-size="12.5" fill="#1A2B3C">• Esquece-se de registar refeições</text>
  <text x="420" y="600" font-size="12.5" fill="#1A2B3C">• Sente-se pouco confiante a gerir</text>
  <text x="420" y="618" font-size="12.5" fill="#1A2B3C">  a diabetes sozinha</text>
  <text x="420" y="641" font-size="12.5" fill="#1A2B3C">• Receio de carregar no botão</text>
  <text x="420" y="659" font-size="12.5" fill="#1A2B3C">  errado e estragar a app</text>

  <!-- Section 4: TECNOLOGIA (bottom-right) -->
  <g transform="translate(830, 450)">
    <rect x="-9" y="-15" width="18" height="28" rx="3" fill="none" stroke="#B8893A" stroke-width="2"/>
    <line x1="-3" y1="9" x2="3" y2="9" stroke="#B8893A" stroke-width="2" stroke-linecap="round"/>
    <text x="22" y="5" font-size="15" font-weight="700" fill="#B8893A" letter-spacing="0.6">TECNOLOGIA</text>
  </g>
  <text x="830" y="490" font-size="12.5" fill="#1A2B3C">• Smartphone Android</text>
  <text x="830" y="508" font-size="12.5" fill="#1A2B3C">  (intermédio, há 3 anos)</text>
  <text x="830" y="536" font-size="12.5" fill="#1A2B3C">• Glucómetro convencional</text>
  <text x="830" y="559" font-size="12.5" fill="#1A2B3C">• Wi-Fi em casa</text>
  <text x="830" y="582" font-size="12.5" fill="#1A2B3C">• Dados móveis limitados</text>
  <text x="830" y="610" font-size="12.5" fill="#1A2B3C">• Apps habituais: WhatsApp,</text>
  <text x="830" y="628" font-size="12.5" fill="#1A2B3C">  câmara, YouTube, banco</text>
  <text x="830" y="656" font-size="12.5" fill="#1A2B3C">• Apps de saúde: SNS 24,</text>
  <text x="830" y="674" font-size="12.5" fill="#1A2B3C">  Receita Sem Papel</text>

  <!-- Reference at bottom -->
  <text x="420" y="775" font-size="9" font-style="italic" fill="#8A9AAB">Adaptado de: Muchagata, J., Teles, S., Vieira-Marques, P., Abrantes, D., Ferreira, A. (2020).</text>
  <text x="420" y="788" font-size="9" font-style="italic" fill="#8A9AAB">Dementia and mHealth: On the Way to GDPR Compliance. https://doi.org/10.1007/978-3-030-46970-2_19</text>
</svg>
